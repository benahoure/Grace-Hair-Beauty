name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, prod]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.14.1"

jobs:
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Build Lambda packages
        working-directory: lambdas
        run: |
          pip install --quiet --upgrade pip
          make build

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config=backend/${{ inputs.environment }}.tfbackend -reconfigure

      - name: Terraform Plan
        id: plan
        working-directory: infra
        run: |
          terraform plan \
            -var-file=env/${{ inputs.environment }}.tfvars \
            -out=tfplan \
            -detailed-exitcode || echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: infra/tfplan
          retention-days: 1

  apply:
    name: Apply (${{ inputs.environment }})
    needs: plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'prod' && 'production' || 'development' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Build Lambda packages
        working-directory: lambdas
        run: |
          pip install --quiet --upgrade pip
          make build

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config=backend/${{ inputs.environment }}.tfbackend -reconfigure

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: infra/

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply tfplan

      - name: Flush Lambda SSM cache
        run: |
          for fn in \
            gracehairsbeauty-${{ inputs.environment }}-public-api \
            gracehairsbeauty-${{ inputs.environment }}-admin-api; do
            aws lambda update-function-configuration \
              --function-name "$fn" \
              --description "cache-flush-${{ github.run_id }}" \
              --no-cli-pager || true
          done
